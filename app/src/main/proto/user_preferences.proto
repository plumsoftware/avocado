syntax = "proto3";

option java_package = "ru.plumsoftware.avocado.snippets.proto";
option java_multiple_files = true;

message UserPreferences {
    // Старое поле - оставляем, чтобы не было конфликтов
    bool first_launch = 1;

    // Тема
    AppThemeProto app_theme = 2;

    // Цели
    repeated string user_goals = 3;

    // Ограничения
    repeated string user_restrictions = 4;

    // Онбординг завершен
    bool is_onboarding_completed = 5;
}


enum AppThemeProto {
    SYSTEM = 0;
    LIGHT = 1;
    DARK = 2;
}